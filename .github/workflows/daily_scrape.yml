name: Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py --output booli_daily_snapshot.json

      - name: Run analyzer
        run: python analyze.py booli_daily_snapshot.json

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/listing_data.json
          
          # Check if there are any changes to commit before committing
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated daily Booli scrape $(date +'%Y-%m-%d')"
            git push
          fi
