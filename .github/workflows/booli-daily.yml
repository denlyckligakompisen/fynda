name: Booli Scheduled Crawl

on:
  schedule:
    - cron: "37 4 * * *"  # Daily at 04:37 UTC (plus random sleep below)
  workflow_dispatch:      # Allow manual runs

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      CRAWL_DELAY_SECONDS: "12"
      CACHE_TTL_HOURS: "72"
      CACHE_DIR: .cache/booli
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Random Sleep (0-4 hours)
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 14400))

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: .cache/booli
          key: booli-cache-${{ runner.os }}-${{ hashFiles('scraper.py') }}
          restore-keys: |
            booli-cache-${{ runner.os }}-
            booli-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Booli Crawler
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python scraper.py --output booli_daily_snapshot.json

      - name: Run Analyzer
        run: |
          # Analyze the unified snapshot
          python analyze.py booli_daily_snapshot.json

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: booli-daily-snapshot
          path: |
            booli_snapshot_*.json
            src/listing_data.json

      - name: Commit snapshot (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/listing_data.json public/listing_data.json booli_daily_snapshot.json
          git commit -m "Daily Booli snapshot" || echo "No changes"
          git push
